## @(#) : ci-lint / lint new articles

name: "CI Lint Articles"

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
  workflow_dispatch:

jobs:
  lint-on-github:
    name: lint articles on GitHub
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Debug workspace
        run: |
          pwd
          ls -la
          ls -la scripts || true

      - name: Fetch main repository
        run: |
          git fetch origin main

      - name: Get changed Markdown files
        id: changed-md
        run: |
          head_sha="$(git rev-parse HEAD)"
          base_sha="$(git rev-parse origin/main)"

          files=$(git diff --diff-filter=AM --name-only "${base_sha}" "${head_sha}" -- '**/*.md')
          printf "changed:\n%s\n" "$files"

          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10

      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          key: ${{ runner.os }}-cache
          path: |
            node_modules
            ~/.pnpm-store
            .cache/*

      - name: Install linters
        run: |
          chmod +x ./scripts/install-doc-tools.sh
          ./scripts/install-doc-tools.sh

      - name: Lint text
        if: ${{ steps.changed-md.outputs.files != '' }}
        env:
          changed_files: "${{ steps.changed-md.outputs.files }}"
        run: |
          pnpm run lint:text "${changed_files}"

      - name: Lint markdown
        if: ${{ steps.changed-md.outputs.files != '' }}
        env:
          changed_files: "${{ steps.changed-md.outputs.files }}"
        run: |
          pnpm run lint:markdown "${changed_files}"

      - name: Always save cache
        id: cache-save
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
          path: |
            node_modules
            ~/.pnpm-store
            .cache/*
